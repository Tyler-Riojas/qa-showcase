# ============================================================
# OrangeHRM Test Framework Configuration
# ============================================================
# Override via system property: -Dbase.url=https://example.com
# ============================================================

# Application Under Test
base.url=https://opensource-demo.orangehrmlive.com

# Browser Configuration
browser=chrome

# OrangeHRM is slower than typical test sites — use a generous timeout
headless=false
timeout=20

# Test Execution Settings
retry.enabled=true
retry.count=2

# Capture screenshot on test failure
screenshot.on.failure=true

# Reporting Configuration
extent.enabled=true
allure.enabled=false

# ===== SELENIUM GRID =====
grid.enabled=false
grid.url=http://localhost:4444
grid.platform=linux
grid.browser.version=
grid.timeout=300
