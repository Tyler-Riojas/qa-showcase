# ============================================================
# Responsive Testing Framework Configuration
# ============================================================
# Override any property via:
#   1. System property: -Dtarget.url=https://example.com
#   2. Environment variable: TARGET_URL=https://example.com
#
# Switch target site:
#   mvn test -Presponsive -Dtarget.url=https://yoursite.com
# ============================================================

# Application Under Test (default — no setup required)
base.url=https://the-internet.herokuapp.com

# Browser Configuration
# Options: chrome, firefox, edge, safari
browser=chrome

# Run browser in headless mode (no UI)
headless=false

# Default wait timeout in seconds
timeout=10

# Test Execution Settings
retry.enabled=true
retry.count=2

# Capture screenshot on test failure
screenshot.on.failure=true

# Reporting Configuration
extent.enabled=true
allure.enabled=false

# ===== SELENIUM GRID =====
grid.enabled=false
grid.url=http://localhost:4444
grid.platform=linux
grid.browser.version=
grid.timeout=300
