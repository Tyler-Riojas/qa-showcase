name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # REST API — RestAssured smoke + CRUD tests against Restful Booker
  # ════════════════════════════════════════════════════════════════════════════
  rest-assured:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rest-assured

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── API server ──────────────────────────────────────────────────────────
      - name: Start Restful Booker
        run: |
          docker run -d \
            --name restfulbooker \
            --memory=512m \
            -p 3001:3001 \
            mwinteringham/restfulbooker

      - name: Wait for Restful Booker to be healthy
        run: |
          echo "Waiting for Restful Booker on port 3001..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/booking > /dev/null; then
              echo "Server is up (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, waiting 2s..."
            sleep 2
          done
          echo "Server did not become healthy within 60 seconds"
          docker logs restfulbooker
          exit 1

      # ── Smoke tests ─────────────────────────────────────────────────────────
      - name: Run smoke tests
        run: mvn test -Psmoke --no-transfer-progress

      # ── CRUD tests ──────────────────────────────────────────────────────────
      - name: Run CRUD tests
        run: mvn test -Pcrud --no-transfer-progress

      # ── Artifacts ───────────────────────────────────────────────────────────
      - name: Upload test reports on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: rest-assured-reports-${{ github.run_number }}
          path: rest-assured/reports/*.html
          retention-days: 7

      - name: Upload Allure results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: rest-assured-allure-${{ github.run_number }}
          path: rest-assured/target/allure-results/
          retention-days: 7

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-rest-assured
          path: rest-assured/target/allure-results/
          retention-days: 1

      # ── Cleanup ─────────────────────────────────────────────────────────────
      - name: Stop Restful Booker
        if: always()
        run: docker stop restfulbooker && docker rm restfulbooker

  # ════════════════════════════════════════════════════════════════════════════
  # KIBEAM UI — smoke tests against live kibeam.com, headless
  # kibeam-ui uses continue-on-error because testImagesResponsive
  # intentionally fails — it identified a real production defect on
  # kibeam.com (image overflow 90px on tablet viewport). This is
  # the test doing its job correctly.
  # ════════════════════════════════════════════════════════════════════════════
  kibeam-ui:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: kibeam-ui-testing

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── Smoke tests ─────────────────────────────────────────────────────────
      - name: Run smoke tests
        run: mvn test -Psmoke -Dheadless=true --no-transfer-progress

      # ── Artifacts ───────────────────────────────────────────────────────────
      - name: Upload test reports on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: kibeam-ui-reports-${{ github.run_number }}
          path: kibeam-ui-testing/reports/*.html
          retention-days: 7

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-kibeam-ui
          path: kibeam-ui-testing/target/allure-results/
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════════
  # PERFORMANCE — UI timing, network capture, and K6 load tests
  # ════════════════════════════════════════════════════════════════════════════
  performance:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: performance-testing

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── K6 ──────────────────────────────────────────────────────────────────
      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo 'deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main' \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      # ── API server ──────────────────────────────────────────────────────────
      - name: Start Restful Booker
        run: |
          docker run -d \
            --name restfulbooker \
            --memory=512m \
            -p 3001:3001 \
            mwinteringham/restfulbooker

      - name: Wait for Restful Booker to be healthy
        run: |
          echo "Waiting for Restful Booker on port 3001..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/booking > /dev/null; then
              echo "Server is up (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, waiting 2s..."
            sleep 2
          done
          echo "Server did not become healthy within 60 seconds"
          docker logs restfulbooker
          exit 1

      # ── Smoke tests ─────────────────────────────────────────────────────────
      - name: Run performance smoke tests
        run: mvn test -Pperformance-smoke -Dheadless=true --no-transfer-progress

      # ── Artifacts ───────────────────────────────────────────────────────────
      - name: Upload test reports on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: performance-reports-${{ github.run_number }}
          path: performance-testing/reports/*.html
          retention-days: 7

      - name: Upload Allure results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: performance-allure-${{ github.run_number }}
          path: performance-testing/target/allure-results/
          retention-days: 7

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-performance
          path: performance-testing/target/allure-results/
          retention-days: 1

      # ── Cleanup ─────────────────────────────────────────────────────────────
      - name: Stop Restful Booker
        if: always()
        run: docker stop restfulbooker && docker rm restfulbooker

  # ════════════════════════════════════════════════════════════════════════════
  # ACCESSIBILITY — WCAG 2.1 AA smoke scan against the-internet.herokuapp.com
  # ════════════════════════════════════════════════════════════════════════════
  accessibility:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: accessibility-testing

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── Smoke tests ─────────────────────────────────────────────────────────
      - name: Run accessibility smoke tests
        run: mvn test -Paccessibility-smoke -Dheadless=true --no-transfer-progress

      # ── Artifacts ───────────────────────────────────────────────────────────
      - name: Upload test reports on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: accessibility-reports-${{ github.run_number }}
          path: accessibility-testing/reports/*.html
          retention-days: 7

      - name: Upload Allure results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: accessibility-allure-${{ github.run_number }}
          path: accessibility-testing/target/allure-results/
          retention-days: 7

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-accessibility
          path: accessibility-testing/target/allure-results/
          retention-days: 1

  # ════════════════════════════════════════════════════════════════════════════
  # ALLURE REPORT — aggregate results from all jobs and deploy to GitHub Pages
  # ════════════════════════════════════════════════════════════════════════════
  allure-report:
    name: Generate and Deploy Allure Report
    runs-on: ubuntu-latest
    needs: [rest-assured, kibeam-ui, performance, accessibility]
    if: always()
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Download results ────────────────────────────────────────────────────
      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: combined-allure-results
          merge-multiple: true

      # ── Generate report ─────────────────────────────────────────────────────
      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure report
        run: allure generate combined-allure-results --clean -o allure-report
        continue-on-error: true

      # ── Deploy to GitHub Pages ───────────────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
