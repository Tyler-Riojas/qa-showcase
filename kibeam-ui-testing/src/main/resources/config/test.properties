# ============================================================
# Test Framework Configuration - Default Environment
# ============================================================
# Override any property via:
#   1. System property: -Dbase.url=https://example.com
#   2. Environment variable: BASE_URL=https://example.com
#   3. Environment-specific file: staging.properties, prod.properties
#
# Switch environments with: mvn test -Denv=staging
# ============================================================

# Application Under Test
base.url=https://kibeam.com

# Browser Configuration
# Options: chrome, firefox, edge, safari
browser=chrome

# Run browser in headless mode (no UI)
headless=false

# Default wait timeout in seconds
timeout=10

# Test Execution Settings
# Enable/disable retry on test failure
retry.enabled=true

# Number of times to retry failed tests (only used if retry.enabled=true)
retry.count=2

# Capture screenshot on test failure
screenshot.on.failure=true

# Reporting Configuration
# Enable Extent Reports HTML reporting
extent.enabled=true

# Enable Allure Reports (requires additional setup)
allure.enabled=false

# Accessibility Testing
# Enable comprehensive WCAG 2.1 Level AA scanning
accessibility.enabled=true
accessibility.fail.on.critical=false

# Use both Axe-core and custom checker
accessibility.use.axe=true
accessibility.use.custom=true

# WCAG tags to check - comprehensive coverage
accessibility.tags=wcag2a,wcag2aa,wcag21a,wcag21aa,best-practice

# Optionally enable specific rules for granular control (uncomment to use)
# accessibility.rules=color-contrast,label,button-name,link-name,image-alt,heading-order

# ============================================================
# Additional Settings (optional - uncomment to enable)
# ============================================================

# Implicit wait timeout (generally not recommended with explicit waits)
# implicit.wait=0

# Page load timeout in seconds
# page.load.timeout=30

# Script timeout in seconds
# script.timeout=30

# Grid/Remote execution
# grid.enabled=false
# grid.url=http://localhost:4444/wd/hub

# Parallel execution
# parallel.threads=4

# Test data
# test.data.path=src/test/resources/testdata

# Logging
# log.level=INFO
