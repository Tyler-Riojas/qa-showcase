# ============================================================
# Test Framework Configuration - Development Environment
# ============================================================
# Usage: mvn test -Denv=dev
# ============================================================

# Development environment URL
base.url=https://dev.kibeam.com

# Run with UI for debugging during development
headless=false

# Longer timeout for dev environment (may be slower/unstable)
timeout=20

# More retries for flaky dev environment
retry.count=3

# Always capture screenshots for debugging
screenshot.on.failure=true
