# ============================================================
# Test Framework Configuration - Production Environment
# ============================================================
# Usage: mvn test -Denv=prod
# WARNING: Use with caution - runs against production!
# ============================================================

# Production URL
base.url=https://kibeam.com

# Always headless for production smoke tests
headless=true

# Standard timeout
timeout=10

# Minimal retries - production should be stable
retry.count=1

# Always capture screenshots for production issues
screenshot.on.failure=true
