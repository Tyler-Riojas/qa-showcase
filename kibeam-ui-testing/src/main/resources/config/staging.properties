# ============================================================
# Test Framework Configuration - Staging Environment
# ============================================================
# Usage: mvn test -Denv=staging
# ============================================================

# Staging environment URL
base.url=https://staging.kibeam.com

# Use headless for CI/CD pipelines
headless=true

# Longer timeout for staging (may be slower)
timeout=15

# More retries for flaky staging environment
retry.count=3
